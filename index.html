<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Audio-in-Border Prototype</title>
  <link rel="stylesheet" href="style.css">
  <script type="importmap">
  {
    "imports": {}
  }
  </script>
</head>
<body>
  <main>
    <section id="encode">
      <h1>Encode audio into image border</h1>
      <div class="row">
        <label class="file">
          Image (PNG/JPEG)
          <input id="imgIn" type="file" accept="image/png,image/jpeg">
        </label>
        <label class="file">
          Audio (WAV/MP3/OGG)
          <input id="audioIn" type="file" accept="audio/*">
        </label>
      </div>
      <div class="row">
        <label>Per-frame duration ms (for calculation)
          <input id="frameMs" type="number" value="50" min="1">
        </label>
        <label>Sample rate (Hz)
          <input id="sampleRate" type="number" value="44100" min="8000">
        </label>
      </div>
      <div class="row actions">
        <button id="encodeBtn">Encode → produce GIF</button>
        <a id="downloadLink" class="hidden" download="audio_border.gif">Download Encoded GIF</a>
      </div>
      <canvas id="preview" width="480" height="320" class="hidden"></canvas>
    </section>

    <hr>

    <section id="decode">
      <h1>Decode audio from image border</h1>
      <div class="row">
        <label class="file">
          Encoded Image (PNG)
          <input id="encodedIn" type="file" accept="image/png,image/jpeg">
        </label>
      </div>
      <div class="row actions">
        <button id="decodeBtn">Decode & Play</button>
        <audio id="player" controls></audio>
      </div>
    </section>

    <footer>
      Prototype: single-image border encoding. For multi-frame GIFs the same method applies per frame.
    </footer>
  </main>

  <script type="module" src="app.js"></script>

</body>
</html>
